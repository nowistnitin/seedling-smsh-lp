<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You! | Seedling Public School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a5276;
      --green: #1e8449;
      --accent: #e67e22;
      --accent2: #f39c12;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #1a5276 0%, #0e3550 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 60px 48px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1e8449, #27ae60);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .icon svg { width: 40px; height: 40px; fill: #fff; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--primary);
      margin-bottom: 14px;
    }
    p {
      font-size: 16px;
      color: #5d7a8c;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      padding: 15px 32px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(230,126,34,.35);
      transition: all .25s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(230,126,34,.45);
    }
    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1z"/></svg>
    </div>
    <h1>Thank You!</h1>
    <p>We've received your enquiry. Our admission counsellor will call you within 24 hours to guide you through the next steps.</p>
    <a href="https://seedlingschools.com" class="btn">Back to Website →</a>
  </div>
</body>
</html>
